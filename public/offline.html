<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menuverse - Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #0f0f0f;
        color: #f4efe7;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 360px;
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        color: #d7a84f;
        font-size: 28px;
      }

      p {
        margin: 0;
        color: #c8beb2;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>Your order was placed. Menuverse will sync your status when you reconnect.</p>
    </main>
  </body>
</html>
